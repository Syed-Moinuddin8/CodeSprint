services:
  - type: web
    name: codesprint-2026-api
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install && cd artifacts/api-server && pnpm run build
    startCommand: cd artifacts/api-server && node --enable-source-maps dist/index.mjs
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
